<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>CriminalBlog</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">CriminalBlog</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Casos</a>
</li>

{% if user.is_authenticated %}

<li class="nav-item">
<a class="nav-link" href="/accounts/profile/">Perfil</a>
</li>

<li class="nav-item">
<form action="/accounts/logout/" method="post" style="display:inline;">
{% csrf_token %}
<button type="submit" class="btn btn-link nav-link" style="display:inline; padding:0;">
Logout
</button>
</form>
</li>

{% else %}

<li class="nav-item">
<a class="nav-link" href="/accounts/login/">Login</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'register' %}">Registrarse</a>
</li>

{% endif %}

<li class="nav-item">
<a class="nav-link" href="{% url 'about' %}">About</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'inbox' %}">
Mensajes
{% if unread_count %}
<span class="badge bg-danger">+{{ unread_count }}</span>
{% endif %}
</a>
</li>

</ul>

</div>

</div>

</nav>


<div class="container mt-5">

{% block content %}

{% endblock %}

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
