<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>Iniciar sesión</h2>

<form method="post" autocomplete="off">

{% csrf_token %}

<p>
<label>Usuario</label><br>
{{ form.username }}
</p>

<p>
<label>Contraseña</label><br>
{{ form.password }}
</p>

<button type="submit">Entrar</button>

</form>

<p>No tienes cuenta?</p>

<a href="{% url 'register' %}">Registrarse</a>

</body>
</html>
