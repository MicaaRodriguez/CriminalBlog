{% extends "base.html" %}

{% block content %}

<a href="{% url 'profile' %}" class="btn btn-secondary mb-3">
← Volver al perfil
</a>

<h2>Editar perfil</h2>

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<h3>Datos de usuario</h3>
{{ user_form.as_p }}

<h3>Perfil</h3>
{{ profile_form.as_p }}

<button type="submit">Guardar cambios</button>

</form>

{% endblock %}
